                    const isSel = selectedSymptoms.includes(key);
                    return (
                      <button key={key} onClick={() => toggleSymptom(key)} style={{ display:"block", width:"100%", textAlign:"left", padding:"10px 13px", marginBottom:"5px", background: isSel ? "rgba(201,169,110,0.1)" : "rgba(255,255,255,0.6)", border:`1px solid ${isSel ? "#c9a96e" : "rgba(201,169,110,0.2)"}`, borderRadius:"9px", cursor:"pointer", fontFamily:"inherit", transition:"all 0.15s" }}>
                        <div style={{ display:"flex", alignItems:"flex-start", gap:"9px" }}>
                          <span style={{ fontSize:"16px", flexShrink:0, color: isSel ? "#c9a96e" : "#ccc" }}>{isSel ? "☑" : "☐"}</span>
                          <div style={{ fontSize:"13px", color:"#4a3420", lineHeight:"1.5" }}>{sym.desc}</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {activeTab === "dosage" && (
          <div style={{ display:"flex", flexDirection:"column", gap:"14px" }}>
            {dosageSections.map(sec => (
              <div key={sec.title} style={{ background:"rgba(255,255,255,0.75)", borderRadius:"14px", border:"1px solid rgba(201,169,110,0.2)", overflow:"hidden", boxShadow:"0 1px 8px rgba(44,31,14,0.05)" }}>
                <div style={{ padding:"14px 16px", background:"linear-gradient(135deg,rgba(201,169,110,0.06),rgba(201,169,110,0.02))", borderBottom:"1px solid rgba(201,169,110,0.15)", display:"flex", alignItems:"center", gap:"10px" }}>
                  <span style={{ fontSize:"20px" }}>{sec.icon}</span>
                  <h3 style={{ margin:0, fontSize:"15px", fontWeight:"600", color:"#2c1f0e" }}>{sec.title}</h3>
                </div>
                <div style={{ padding:"14px 16px" }}>
                  {sec.content.map((point, i) => (
                    <p key={i} style={{ margin:"0 0 10px", fontSize:"13px", lineHeight:"1.75", color:"#4a3420", borderLeft:"2px solid rgba(201,169,110,0.35)", paddingLeft:"12px" }}>{point}</p>
                  ))}
                </div>
              </div>
            ))}
            <div style={{ textAlign:"center", padding:"20px", fontSize:"11px", color:"rgba(107,80,48,0.6)", lineHeight:"1.9" }}>
              Based on the Homoeopathic Quick Prescription Guide<br />
              Authors: R.K. Tandon &amp; Dr. V.R. Bajaj, M.D.<br />
              Published by Rajendra Publishing House Pvt. Ltd., Worli Sea Face, Bombay<br /><br />
              <em>This app is for informational purposes only.<br />Always consult a qualified homoeopathic practitioner for serious conditions.</em>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
